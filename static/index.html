<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tinode Server</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #333; }
    h1 { color: #4a90e2; }
    .info { background: #f0f4f8; padding: 16px; border-radius: 8px; margin: 20px 0; }
    code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; }
    a { color: #4a90e2; }
  </style>
</head>
<body>
  <h1>✅ Tinode Server Online</h1>
  <div class="info">
    <p><strong>Tinode v0.25.3</strong> is running.</p>
    <p>API: <code>/v2/</code></p>
    <p>Status: <code>/debug/status</code></p>
    <p>Expvar: <code>/debug/vars</code></p>
  </div>
  <p>To install the full web UI, download <code>tinode-web.tar.gz</code> from the
  <a href="https://github.com/tinode/chat/releases">Tinode releases page</a>
  and copy its contents to the <code>static/</code> directory.</p>
</body>
</html>
