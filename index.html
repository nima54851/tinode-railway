<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinode — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:420px;margin:20px}
.logo{font-size:28px;font-weight:700;color:#3949AB;text-align:center;margin-bottom:8px}
.subtitle{color:#666;text-align:center;margin-bottom:32px;font-size:14px}
.form-group{margin-bottom:20px}
label{display:block;margin-bottom:6px;font-weight:500;color:#333;font-size:14px}
input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;transition:border .2s;outline:none}
input:focus{border-color:#3949AB}
.btn{width:100%;padding:14px;background:#3949AB;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#283593}
.btn:disabled{background:#9fa8da;cursor:not-allowed}
.error{color:#e53935;font-size:13px;margin-top:8px;display:none}
.info{background:#e8f5e9;border-radius:8px;padding:16px;margin-top:24px;font-size:13px;color:#2e7d32;display:none}
.token-display{background:#f5f5f5;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;word-break:break-all;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="container">
  <div class="logo">💬 Tinode</div>
  <div class="subtitle">Sign in to your account</div>
  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="alice@example.com" required value="alice@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="password123" required value="password123">
    </div>
    <button type="submit" class="btn" id="loginBtn">Sign In</button>
    <div class="error" id="error"></div>
  </form>
  <div class="info" id="info">
    <strong>✅ Connected!</strong>
    <p style="margin-top:8px">Token received:</p>
    <div class="token-display" id="tokenDisplay"></div>
    <p style="margin-top:12px;font-size:12px;color:#666">Server: <span id="serverUrl"></span></p>
    <p style="margin-top:8px;font-size:12px;color:#888">This is a demo page. For full chat functionality, use the <a href="https://github.com/tinode/chat/releases" target="_blank">Tinode mobile/desktop app</a>.</p>
  </div>
</div>
<script>
const API_KEY = 'AQEAluraXiPALmQ='; // default API key from Tinode
const BASE = window.location.origin;
const API = BASE + '/v2';

function err(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearErr() {
  document.getElementById('error').style.display = 'none';
}

document.getElementById('serverUrl').textContent = BASE;
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  clearErr();

  try {
    const resp = await fetch(API + '/auth', {
      method: 'POST',
      headers:{'Content-Type':'application/json','X-Tinode-API-Key': API_KEY},
      body: JSON.stringify({scheme:'basic',secret:btoa(email+':'+password)})
    });
    const data = await resp.json();
    if (resp.ok && data.ctrl && data.ctrl.code >= 200 && data.ctrl.code < 300) {
      document.getElementById('loginForm').style.display = 'none';
      document.querySelector('.subtitle').textContent = 'Authentication successful!';
      document.getElementById('info').style.display = 'block';
      document.getElementById('tokenDisplay').textContent = data.ctrl.token || 'token in ctrl response';
      document.querySelector('.logo').textContent = '✅ ' + email.split('@')[0];
    } else {
      err((data.ctrl && data.ctrl.text) || 'Login failed (code ' + (data.ctrl&&data.ctrl.code) + ')');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(e) {
    err('Connection error: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
};
</script>
</body>
</html>
